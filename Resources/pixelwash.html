<meta charset="utf-8">
<title>PixelWash</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  canvas { display: block; width: 100%; height: 100%; }
</style>
<canvas id="cv"></canvas>
<script>
/* ============================================================
   EINSTELLUNGEN  ->  hier anpassen, dann Screensaver neu starten
   (Resource editierbar im installierten Bundle, kein Re-Build noetig)
   ============================================================ */
const CONFIG = {
  // Aktive Modi und ihre Reihenfolge im Auto-Mix.
  // Verfuegbar: 'noise', 'cycle', 'bars', 'checker'
  modes: ['noise', 'cycle', 'bars', 'checker'],
  // Sekunden pro Modus, bevor automatisch gewechselt wird (0 = nie wechseln):
  switchEverySec: 45,
  // Render-Tempo 1..10 (hoeher = schnellere Wechsel/Bewegung):
  tempo: 6
};
/* ============================================================ */

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d', { alpha: false });
let W = 0, H = 0, dpr = 1;

function resize() {
  dpr = Math.min(window.devicePixelRatio || 1, 2);
  W = Math.floor(innerWidth  * dpr);
  H = Math.floor(innerHeight * dpr);
  cv.width = W; cv.height = H;
}
addEventListener('resize', resize); resize();

const speed = Math.min(10, Math.max(1, CONFIG.tempo));
const MODES = (CONFIG.modes && CONFIG.modes.length) ? CONFIG.modes : ['noise'];
let modeIdx = 0;
let mode = MODES[0];

/* --- Modus 1: RGB-Rauschen --- */
function drawNoise() {
  const block = 7 * dpr;
  for (let y = 0; y < H; y += block) {
    for (let x = 0; x < W; x += block) {
      const r = (Math.random() * 256) | 0;
      const g = (Math.random() * 256) | 0;
      const b = (Math.random() * 256) | 0;
      ctx.fillStyle = 'rgb(' + r + ',' + g + ',' + b + ')';
      ctx.fillRect(x, y, block, block);
    }
  }
}

/* --- Modus 2: Vollfarben-Zyklus --- */
const CYCLE = ['#ffffff', '#000000', '#ff0000', '#00ff00', '#0000ff',
               '#ffff00', '#00ffff', '#ff00ff', '#808080'];
let cycleIdx = 0, cycleTick = 0;
function drawCycle() {
  const every = Math.max(2, 22 - speed * 2);
  if (cycleTick++ % every === 0) cycleIdx = (cycleIdx + 1) % CYCLE.length;
  ctx.fillStyle = CYCLE[cycleIdx];
  ctx.fillRect(0, 0, W, H);
}

/* --- Modus 3: diagonale Laufstreifen --- */
let barOff = 0;
function drawBars() {
  const bar = 80 * dpr;
  barOff = (barOff + speed * dpr) % (bar * 2);
  ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
  ctx.fillStyle = '#fff';
  for (let x = -bar * 2 + barOff; x < W + H; x += bar * 2) {
    ctx.beginPath();
    ctx.moveTo(x, 0);
    ctx.lineTo(x + bar, 0);
    ctx.lineTo(x + bar - H, H);
    ctx.lineTo(x - H, H);
    ctx.closePath(); ctx.fill();
  }
}

/* --- Modus 4: invertierendes Schachbrett --- */
let checkTick = 0, checkInv = false;
function drawChecker() {
  const every = Math.max(2, 18 - speed);
  if (checkTick++ % every === 0) checkInv = !checkInv;
  const c = 24 * dpr;
  for (let y = 0, ry = 0; y < H; y += c, ry++) {
    for (let x = 0, rx = 0; x < W; x += c, rx++) {
      const on = ((rx + ry) & 1) === (checkInv ? 1 : 0);
      ctx.fillStyle = on ? '#fff' : '#000';
      ctx.fillRect(x, y, c, c);
    }
  }
}

const RENDER = { noise: drawNoise, cycle: drawCycle, bars: drawBars, checker: drawChecker };

/* Pro-Modus-Mindestintervall (ms). 'noise' zeichnet zehntausende fillRects pro
   Frame -> auf 4K/Multi-Monitor bei vollem Tempo teuer. Auf <=30fps deckeln;
   zum Waschen reicht das voellig, der Tempo-Regler greift erst darunter. */
const MODE_MIN_INTERVAL = { noise: 33 };

/* --- Auto-Mix: Modus alle switchEverySec wechseln --- */
let lastSwitch = performance.now();
function maybeSwitchMode(now) {
  if (CONFIG.switchEverySec <= 0 || MODES.length < 2) return;
  if (now - lastSwitch >= CONFIG.switchEverySec * 1000) {
    modeIdx = (modeIdx + 1) % MODES.length;
    mode = MODES[modeIdx];
    lastSwitch = now;
  }
}

/* --- Hauptschleife: Tempo drosselt die effektive Bildrate --- */
let acc = 0, last = performance.now();
function loop(now) {
  requestAnimationFrame(loop);
  maybeSwitchMode(now);
  const base = 16 + (10 - speed) * 9;       // Tempo 10 ~ 60fps, Tempo 1 ~ 10fps
  const interval = Math.max(base, MODE_MIN_INTERVAL[mode] || 0);
  acc += now - last; last = now;
  if (acc >= interval) {
    acc = 0;
    (RENDER[mode] || drawNoise)();
  }
}
requestAnimationFrame(loop);
</script>
